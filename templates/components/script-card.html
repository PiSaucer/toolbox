      <div class="col-md-6 col-xl-4" data-script-card data-search="{{search_blob}}" data-tags="{{tag_data}}" data-category="{{category}}">
        <article class="card script-card h-100 border-0 shadow-sm">
          <div class="card-body p-4 d-flex flex-column">
            <p class="section-kicker mb-2">{{category}}</p>
            <h2 class="h4 fw-bold"><a class="stretched-link text-decoration-none text-body" href="{{page_path}}">{{name}}</a></h2>
            <div class="d-flex flex-wrap gap-2 position-relative z-1">
              {{tags}}
              {{platforms}}
            </div>
            <p class="text-secondary flex-grow-1">{{description}}</p>
          </div>
        </article>
      </div>
