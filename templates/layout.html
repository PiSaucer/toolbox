<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <meta name="description" content="{{site_description}}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{base_path}}/assets/site.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/default.min.css">
  <link rel="stylesheet" href="{{base_path}}/assets/atom-one-dark.css">

  <!-- Favicons -->
  <link rel="icon" type="image/png" href="{{base_path}}/assets/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="{{base_path}}/assets/favicon/favicon.svg" />
  <link rel="shortcut icon" href="{{base_path}}/assets/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="{{base_path}}/assets/favicon/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="toolbox" />
  <link rel="manifest" href="{{base_path}}/assets/favicon/site.webmanifest" />
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <a href="{{repository_url}}" class="github-corner" aria-label="View source on GitHub">
      <svg width="80" height="80" viewBox="0 0 250 250" aria-hidden="true">
        <path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z" />
        <path d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2" fill="currentColor" class="octo-arm" />
        <path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z" fill="currentColor" class="octo-body" />
      </svg>
    </a>
    <div class="container py-2">
      <a class="navbar-brand fw-bold d-inline-flex align-items-center gap-2" href="{{base_path}}/">
        <span class="brand-mark"><i class="bi bi-tools" aria-hidden="true"></i></span>
        {{site_title}}
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#siteNav" aria-controls="siteNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="siteNav">
        <div class="navbar-nav ms-auto gap-lg-2">
          <a class="nav-link" href="{{base_path}}/manifest.json"><i class="bi bi-braces me-1" aria-hidden="true"></i>Manifest</a>
          <a class="nav-link" href="{{repository_url}}"><i class="bi bi-github me-1" aria-hidden="true"></i>GitHub</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="container py-4">
{{content}}
  </main>

  <footer class="site-footer mt-5">
    <div class="container py-5">
      <div class="row g-4 align-items-center">
        <div class="col-md-7">
          <a class="footer-brand d-inline-flex align-items-center gap-2 mb-2" href="{{base_path}}/">
            <span class="brand-mark"><i class="bi bi-tools" aria-hidden="true"></i></span>
            {{site_title}}
          </a>
          <p class="mb-0 text-secondary">{{site_description}}</p>
        </div>
        <div class="col-md-5">
          <div class="d-flex flex-wrap justify-content-md-end gap-2">
            <a class="btn btn-sm btn-outline-primary" href="{{base_path}}/manifest.json"><i class="bi bi-filetype-json me-1" aria-hidden="true"></i>Manifest</a>
            <a class="btn btn-sm btn-primary" href="{{repository_url}}"><i class="bi bi-github me-1" aria-hidden="true"></i>Source</a>
          </div>
        </div>
      </div>
  </footer>
{{script_data}}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script src="https://unpkg.com/@highlightjs/cdn-assets@11.5.1/languages/powershell.min.js"></script>
  <script src="{{base_path}}/assets/site.js"></script>
  <script>hljs.highlightAll();</script>

</body>
</html>
